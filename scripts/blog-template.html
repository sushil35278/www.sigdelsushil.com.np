<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Sushil Sigdel</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/fontawesome.css">
    <link rel="stylesheet" href="../assets/css/main.css">

    <style>
        :root {
            --primary-accent: {
                    {
                    accent_color
                }
            }

            ;
            --text-dark: #2d3436;
            --text-gray: #636e72;
        }

        body {
            background-color: #fafbfc;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
        }

        .blog-hero {
            position: relative;
            padding: 120px 0 80px;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
            url('{{image}}');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: -40px;
        }

        .blog-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 25px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .category-tag {
            background: var(--primary-accent);
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .blog-meta-top {
            font-size: 1rem;
            opacity: 0.9;
        }

        .content-container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 5;
        }

        .featured-img-wrap {
            margin-bottom: 40px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .featured-img-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }

        .blog-body {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #444;
        }

        .blog-body h3 {
            font-family: 'Playfair Display', serif;
            color: var(--text-dark);
            font-size: 2rem;
            margin-top: 45px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .blog-body p {
            margin-bottom: 25px;
        }

        .blog-body ul {
            margin-bottom: 30px;
            padding-left: 20px;
        }

        .blog-body li {
            position: relative;
            padding-left: 10px;
            margin-bottom: 12px;
        }

        .footer-action {
            margin-top: 60px;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 40px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary-accent);
            font-weight: 600;
            text-decoration: none;
            gap: 10px;
            transition: 0.3s;
        }

        .back-link:hover {
            transform: translateX(-5px);
            color: #222;
        }

        @media (max-width: 768px) {
            .blog-hero h1 {
                font-size: 2.2rem;
            }

            .content-container {
                padding: 30px;
                border-radius: 0;
                margin-top: 0;
            }
        }
    </style>
</head>

<body>

    <section class="blog-hero">
        <div class="container">
            <span class="category-tag">{{category}}</span>
            <h1>{{title}}</h1>
            <div class="blog-meta-top">
                By <strong>{{author}}</strong> | {{date}}
            </div>
        </div>
    </section>

    <div class="container">
        <div class="content-container">
            <div class="featured-img-wrap">
                <img src="{{image}}" alt="{{title}}" onerror="this.src='../assets/images/bloghome.png'">
            </div>

            <article class="blog-body">
                {{content}}
            </article>

            <div class="footer-action">
                <a href="../#blog" class="back-link">
                    <i class="fa fa-arrow-left"></i> Back to All Stories
                </a>
            </div>
        </div>
    </div>

</body>

</html>
