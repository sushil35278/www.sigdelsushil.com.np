<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Sushil Sigdel</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/fontawesome.css">
    <link rel="stylesheet" href="../assets/css/main.css">

    <style>
        :root {
            --primary-accent: {
                    {
                    accent_color
                }
            }

            ;
            --text-dark: #2d3436;
            --text-gray: #636e72;
        }

        body {
            background-color: #fafbfc;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        /* Reading Progress Bar */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 10000;
        }

        #progress-bar {
            height: 100%;

            background: linear-gradient(to right, {
                    {
                    accent_color
                }
            }

            , #fa65b1);
        width: 0%;
        transition: width 0.1s ease;
        }

        /* Hero Styling */
        .blog-hero {
            position: relative;
            padding: 120px 0 80px;
            background-color: #2a2a2a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
            url('{{image}}');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: -40px;
        }

        .blog-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 25px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .category-tag {
            background: var(--primary-accent);
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .blog-meta-top {
            font-size: 1rem;
            opacity: 0.9;
        }

        .content-container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 5;
        }

        .featured-img-wrap {
            margin-bottom: 40px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .featured-img-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }

        .blog-body {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #444;
        }

        .blog-body h3 {
            font-family: 'Playfair Display', serif;
            color: var(--text-dark);
            font-size: 2rem;
            margin-top: 45px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Floating Social Share */
        .share-buttons {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .share-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-decoration: none;
        }

        .share-btn:hover {
            transform: scale(1.1) translateX(5px);
            color: white;
        }

        .share-tw {
            background: #1DA1F2;
        }

        .share-li {
            background: #0077b5;
        }

        .share-fb {
            background: #4267B2;
        }

        /* Sticky Back to Top */
        #scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-accent);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            z-index: 100;
            border: none;
        }

        #scroll-top.show {
            visibility: visible;
            opacity: 1;
        }

        .footer-action {
            margin-top: 60px;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 40px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary-accent);
            font-weight: 600;
            text-decoration: none;
            gap: 10px;
            transition: 0.3s;
        }

        @media (max-width: 1200px) {
            .share-buttons {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .blog-hero h1 {
                font-size: 2.2rem;
            }

            .content-container {
                padding: 30px;
                border-radius: 0;
                margin-top: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Reading Progress Bar -->
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <!-- Social Share -->
    <div class="share-buttons">
        <a href="javascript:void(0)" class="share-btn share-tw" onclick="share('twitter')"><i
                class="fab fa-twitter"></i></a>
        <a href="javascript:void(0)" class="share-btn share-li" onclick="share('linkedin')"><i
                class="fab fa-linkedin-in"></i></a>
        <a href="javascript:void(0)" class="share-btn share-fb" onclick="share('facebook')"><i
                class="fab fa-facebook-f"></i></a>
    </div>

    <!-- Scroll Top -->
    <button id="scroll-top"><i class="fa fa-angle-up"></i></button>

    <section class="blog-hero">
        <div class="container">
            <span class="category-tag">{{category}}</span>
            <h1>{{title}}</h1>
            <div class="blog-meta-top">
                By <strong>{{author}}</strong> | {{date}}
            </div>
        </div>
    </section>

    <div class="container">
        <div class="content-container">
            <div class="featured-img-wrap">
                <img src="{{image}}" alt="{{title}}" onerror="this.src='../assets/images/bloghome.png'">
            </div>

            <article class="blog-body">
                {{content}}
            </article>

            <div class="footer-action">
                <a href="../#blog" class="back-link">
                    <i class="fa fa-arrow-left"></i> Back to All Stories
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../vendor/jquery/jquery.min.js"></script>
    <script>
        // Reading Progress Bar
        window.onscroll = function () {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (height > 0) ? (winScroll / height) * 100 : 0;
            document.getElementById("progress-bar").style.width = scrolled + "%";

            // Scroll to Top visibility
            const scrollTop = document.getElementById("scroll-top");
            if (winScroll > 300) {
                scrollTop.classList.add("show");
            } else {
                scrollTop.classList.remove("show");
            }
        };

        // Scroll to Top Action
        document.getElementById("scroll-top").addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Social Share Function
        function share(platform) {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.title);
            let shareUrl = '';

            switch (platform) {
                case 'twitter':
                    shareUrl = `https://twitter.com/intent/tweet?url=${url}&text=${title}`;
                    break;
                case 'linkedin':
                    shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
                    break;
                case 'facebook':
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                    break;
            }

            if (shareUrl) {
                window.open(shareUrl, '_blank', 'width=600,height=400');
            }
        }
    </script>

</body>

</html>
